services:
  postgres:
    image: postgres:16
    container_name: pw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pw_sanita
      POSTGRES_USER: pw_user
      POSTGRES_PASSWORD: pw_password
    ports:
      - "5432:5432"
    volumes:
      - pw_postgres_data:/var/lib/postgresql/data

volumes:
  pw_postgres_data:
