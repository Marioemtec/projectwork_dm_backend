spring:
  application:
    name: clinica-plus
  datasource:
    url: jdbc:postgresql://localhost:5432/clinica_plus
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  mvc:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: '*'
      max-age: 3600

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.clinicaplus: DEBUG

app:
  jwt:
    secret: SuperSecretKeyThatIsVeryLongAndComplexForJWTSigningAndValidationPurposesMaximumSecurity
    expiration: 86400000
    refresh-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
